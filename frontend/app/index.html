<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>app</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet" />
    </noscript>
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0&display=swap" rel="stylesheet" />
    </noscript>

    <style>
      /* Critical CSS for structural render */
      html, body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', sans-serif;
        background-color: #0c0a09; /* Matches dark-theme surface */
        color: #f5f5f4; /* Matches dark text color */
      }
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      header, nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.5rem;
      }
      .font-headline {
        font-family: 'Manrope', sans-serif;
      }
      /* Hero Layout basics */
      section.relative {
        position: relative;
        padding-top: 6rem;
        padding-bottom: 8rem;
        padding-left: 1.5rem;
        padding-right: 1.5rem;
      }
      .max-w-\[1440px\] {
        max-width: 1440px;
      }
      .mx-auto {
        margin-left: auto;
        margin-right: auto;
      }
      @media (min-width: 1024px) {
        .lg\:grid-cols-12 { display: grid; grid-template-columns: repeat(12, minmax(0, 1fr)); }
        .lg\:col-span-7 { grid-column: span 7 / span 7; }
        .lg\:col-span-5 { grid-column: span 5 / span 5; }
      }
    </style>
  </head>
  <body>    
    <div id="root"></div >
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
